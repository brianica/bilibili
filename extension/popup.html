<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bilibili Subtitles</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      width: 280px;
      margin: 0;
      padding: 14px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      background: #0d1117;
      color: #e6edf3;
    }

    header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    header h1 {
      margin: 0;
      font-size: 1rem;
      font-weight: 600;
      color: #fb7299;
    }

    .field { margin-bottom: 10px; }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }

    input[type="text"] {
      width: 100%;
      padding: 7px 10px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 5px;
      color: #e6edf3;
      font-size: 0.85rem;
      outline: none;
    }

    input:focus { border-color: #58a6ff; }
    input::placeholder { color: #484f58; }

    .status-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      margin-bottom: 12px;
      min-height: 18px;
    }

    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot.ok   { background: #3fb950; }
    .dot.err  { background: #f85149; }
    .dot.warn { background: #d29922; }

    button {
      width: 100%;
      padding: 9px;
      font-size: 0.9rem;
      font-weight: 600;
      background: #fb7299;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover:not(:disabled) { background: #f95c86; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    #error {
      margin-top: 10px;
      padding: 7px 10px;
      background: #3d1a1a;
      border: 1px solid #f85149;
      border-radius: 5px;
      color: #f85149;
      font-size: 0.78rem;
      display: none;
      word-break: break-word;
    }

    hr { border: none; border-top: 1px solid #21262d; margin: 12px 0; }
  </style>
</head>
<body>

<header>
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
    <rect width="24" height="24" rx="6" fill="#fb7299"/>
    <path d="M9 8l-3 2.5V16h10V10.5L13 8H9z" fill="white" opacity="0.9"/>
    <circle cx="10" cy="13" r="1.2" fill="#fb7299"/>
    <circle cx="14" cy="13" r="1.2" fill="#fb7299"/>
  </svg>
  <h1>Bilibili Subtitles</h1>
</header>

<div class="status-row" id="cookie-status">
  <span class="dot warn" id="cookie-dot"></span>
  <span id="cookie-msg">Reading cookies…</span>
</div>

<div class="field">
  <label>Web App URL</label>
  <input id="server-url" type="text" placeholder="https://your-app.vercel.app">
</div>

<button id="open-btn" disabled>Open in Web App →</button>

<div id="error"></div>

<script src="popup.js"></script>
</body>
</html>
